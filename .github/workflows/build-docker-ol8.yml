name: Build & Publish Docker Images (OL8)

on:
  push:
    branches: [ release ]
  release:
    types: [ created ]
  workflow_dispatch:
    inputs:
      ref_name:
        description: '镜像标签（如 v1.6.10）'
        required: true
        default: 'v1.0.0'

env:
  REPO_DOCKERHUB: docker.io/qyg2297248353/ammds
  REPO_GHCR: ghcr.io/qyg2297248353/ammds

jobs:
  # ------------------------
  # 1. 统一计算 tag
  # ------------------------
  set-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.calc_tag.outputs.tag }}
    steps:
      - id: calc_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.ref_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            BRANCH=${GITHUB_REF#refs/heads/}
            echo "tag=$BRANCH" >> $GITHUB_OUTPUT
          fi

  # ------------------------
  # 1.5 检查 OL8 镜像是否已存在
  # ------------------------
  check-images:
    needs: set-tag
    runs-on: ubuntu-latest
    outputs:
      skip_build: ${{ steps.check.outputs.skip_build }}
    steps:
      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check if arch images exist (ol8)
        id: check
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          AMD="${{ env.REPO_DOCKERHUB }}:$TAG-amd64-ol8"
          ARM="${{ env.REPO_DOCKERHUB }}:$TAG-arm64-ol8"

          AMD_OK=$(docker buildx imagetools inspect "$AMD" > /dev/null 2>&1 && echo yes || echo no)
          ARM_OK=$(docker buildx imagetools inspect "$ARM" > /dev/null 2>&1 && echo yes || echo no)

          if [[ "$AMD_OK" == "yes" && "$ARM_OK" == "yes" ]]; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

  # ------------------------
  # 2a. 构建 amd64（OL8）
  # ------------------------
  build-amd64:
    needs: [ set-tag, check-images ]
    if: needs.check-images.outputs.skip_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          git lfs install --skip-smudge
          git clone https://x-access-token:${{ secrets.GITHUBTOKEN }}@github.com/QYG2297248353/AMMDS.git source
          cd source && git lfs pull --exclude="*"
      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBTOKEN }}
      - name: Build & push amd64 ol8
        uses: docker/build-push-action@v4
        with:
          context: ./source
          file: ./source/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_OS=oraclelinux:8
          tags: |
            ${{ env.REPO_DOCKERHUB }}:${{ needs.set-tag.outputs.tag }}-amd64-ol8
            ${{ env.REPO_GHCR }}:${{ needs.set-tag.outputs.tag }}-amd64-ol8

  # ------------------------
  # 2b. 构建 arm64（OL8）
  # ------------------------
  build-arm64:
    needs: [ set-tag, check-images ]
    if: needs.check-images.outputs.skip_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          git lfs install --skip-smudge
          git clone https://x-access-token:${{ secrets.GITHUBTOKEN }}@github.com/QYG2297248353/AMMDS.git source
          cd source && git lfs pull --exclude="*"
      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBTOKEN }}
      - name: Build & push arm64 ol8
        uses: docker/build-push-action@v4
        with:
          context: ./source
          file: ./source/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            BASE_OS=oraclelinux:8
          tags: |
            ${{ env.REPO_DOCKERHUB }}:${{ needs.set-tag.outputs.tag }}-arm64-ol8
            ${{ env.REPO_GHCR }}:${{ needs.set-tag.outputs.tag }}-arm64-ol8

  # ------------------------
  # 3a. 跳过构建时合并 manifest（OL8）
  # ------------------------
  manifest-skip:
    needs: [ set-tag, check-images ]
    if: needs.check-images.outputs.skip_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBTOKEN }}
      - uses: docker/setup-buildx-action@v2
      - name: Create & push DockerHub manifest (ol8)
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker buildx imagetools create --tag ${{ env.REPO_DOCKERHUB }}:$TAG-ol8 \
            ${{ env.REPO_DOCKERHUB }}:$TAG-amd64-ol8 \
            ${{ env.REPO_DOCKERHUB }}:$TAG-arm64-ol8
      - name: Create & push GHCR manifest (ol8)
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker buildx imagetools create --tag ${{ env.REPO_GHCR }}:$TAG-ol8 \
            ${{ env.REPO_GHCR }}:$TAG-amd64-ol8 \
            ${{ env.REPO_GHCR }}:$TAG-arm64-ol8

  # ------------------------
  # 3b. 构建后合并 manifest（OL8）
  # ------------------------
  manifest-after-build:
    needs: [ set-tag, check-images, build-amd64, build-arm64 ]
    if: needs.check-images.outputs.skip_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBTOKEN }}
      - uses: docker/setup-buildx-action@v2
      - name: Create & push DockerHub manifest (ol8)
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker buildx imagetools create --tag ${{ env.REPO_DOCKERHUB }}:$TAG-ol8 \
            ${{ env.REPO_DOCKERHUB }}:$TAG-amd64-ol8 \
            ${{ env.REPO_DOCKERHUB }}:$TAG-arm64-ol8
      - name: Create & push GHCR manifest (ol8)
        run: |
          TAG=${{ needs.set-tag.outputs.tag }}
          docker buildx imagetools create --tag ${{ env.REPO_GHCR }}:$TAG-ol8 \
            ${{ env.REPO_GHCR }}:$TAG-amd64-ol8 \
            ${{ env.REPO_GHCR }}:$TAG-arm64-ol8
